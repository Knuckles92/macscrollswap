version: "2"

run:
  timeout: 3m

linters:
  default: standard
  enable:
    - errcheck
    - gocritic
    - gofumpt
    - revive
    - gocyclo
    - misspell
    - unconvert
    - prealloc

linters-settings:
  gocyclo:
    min-complexity: 15

issues:
  exclude-rules:
    - path: _test\.go
      linters: [gocyclo, errcheck]
